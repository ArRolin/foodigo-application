services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodigo
    restart: unless-stopped
    expose:
      - "80"
      - "3306"
      - "6379"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=mysql
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-foodigo}
      - DB_USERNAME=${DB_USERNAME:-foodigo}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-sync}
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME="${APP_NAME:-Foodigo}"
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - AUTO_MIGRATE=${AUTO_MIGRATE:-false}
    volumes:
      - foodigo_mysql:/var/lib/mysql
      - foodigo_storage:/var/www/html/storage
      - foodigo_cache:/var/www/html/bootstrap/cache

volumes:
  foodigo_mysql:
  foodigo_storage:
  foodigo_cache:
